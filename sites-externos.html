<!DOCTYPE html>
<html lang="pt-br" data-theme="light">
<head>
    <!-- Leitura antecipada do tema: evita FOUC (flash de tema errado no F5) -->
    <script>(function(){try{var t=localStorage.getItem('cqb-theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}}());</script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sites Externos - Opus Hub | @CanalQb</title>
    <meta name="description" content="Diretório de sites externos recomendados pelo @CanalQb.">
    <meta name="author" content="@CanalQb">
    <meta name="copyright" content="@CanalQb 2026">
    
    <!-- Custom CSS Framework - Bootstrap Free -->
    <link rel="stylesheet" href="style.css">
    <!-- Advanced Button Component System -->
    <link rel="stylesheet" href="components.css">
    <!-- Font Awesome 6.5 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="cqb-wrapper">
        <div class="cqb-content">
            <!-- ══════════ TOPBAR ════════════ -->
            <header class="cqb-topbar">
                <div style="display:flex;align-items:center;gap:10px;">
                    <i class="fas fa-arrow-left" style="color:var(--text-sub);font-size:0.85rem;cursor:pointer;" onclick="window.history.back()"></i>
                    <span class="cqb-topbar-title">Sites Externos</span>
                </div>
                <div class="cqb-topbar-right">
                    <button class="cqb-theme-btn" onclick="toggleTheme()" id="theme-btn" title="Alternar tema">
                        <i class="fas fa-moon" id="theme-icon"></i>
                    </button>
                </div>
            </header>

            <!-- ════════════ MAIN ════════════ -->
            <main id="cqb-main">
                <div class="cqb-container">
                    <div class="cqb-card">
                        <div class="cqb-card-header">
                            <i class="fas fa-globe hd-icon"></i> Sites Externos Recomendados
                        </div>
                        <div class="cqb-card-body">
                            <div class="cqb-alert cqb-alert-info">
                                <i class="fas fa-info-circle"></i>
                                <span>Selecione um dos sites abaixo para acessar conteúdo externo recomendado pelo @CanalQb.</span>
                            </div>

                            <div id="sites-list" class="row g-3">
                                <!-- Sites serão carregados dinamicamente aqui -->
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // Função para carregar sites do arquivo sites.txt
        async function carregarSites() {
            const container = document.getElementById('sites-list');
            
            try {
                // Ler arquivo sites.txt
                const response = await fetch('sites.txt');
                const text = await response.text();
                
                // Processar linhas do arquivo
                const linhas = text.trim().split('\n');
                const sites = [];
                
                linhas.forEach(linha => {
                    const [titulo, link] = linha.split(';');
                    if (titulo && link) {
                        sites.push({ titulo: titulo.trim(), link: link.trim() });
                    }
                });
                
                // Criar cards para cada site
                sites.forEach(site => {
                    const col = document.createElement('div');
                    col.className = 'col-12 col-sm-6';
                    
                    col.innerHTML = `
                        <div class="cqb-card" style="cursor:pointer;" onclick="window.open('${site.link}', '_blank')">
                            <div class="cqb-card-body" style="text-align:center;padding:20px;">
                                <i class="fas fa-external-link-alt" style="font-size:2rem;color:var(--cqb-blue);margin-bottom:12px;"></i>
                                <h6 style="margin-bottom:8px;color:var(--text-primary);">${site.titulo}</h6>
                                <p style="font-size:0.85rem;color:var(--text-sub);margin:0;">Visitar ${site.titulo}</p>
                                <button class="cqb-btn cqb-btn-primary cqb-btn-block">
                                    <i class="fas fa-external-link-alt"></i> Visitar ${site.titulo}
                                </button>
                            </div>
                        </div>
                    `;
                    
                    container.appendChild(col);
                });
                
            } catch (error) {
                console.error('Erro ao carregar sites:', error);
                container.innerHTML = `
                    <div class="col-12">
                        <div class="cqb-alert cqb-alert-warning">
                            <i class="fas fa-exclamation-triangle"></i>
                            <span>Erro ao carregar sites externos. Verifique o arquivo sites.txt</span>
                        </div>
                    </div>
                `;
            }
        }

        // Função de tema
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('cqb-theme', newTheme);
            
            const icon = document.getElementById('theme-icon');
            icon.className = newTheme === 'light' ? 'fas fa-moon' : 'fas fa-sun';
        }

        // Carregar sites quando página carregar
        document.addEventListener('DOMContentLoaded', carregarSites);
    </script>
</body>
</html>
