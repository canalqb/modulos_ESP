name: CDN Force Update

on:
  schedule:
    # Executar a cada 30 minutos (verificação no código para executar a cada 90 min)
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # Permitir execução manual
  push:
    branches: [ main ]
    paths:
      - 'ambiente/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'ambiente/**'

jobs:
  cdn-force-update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Check if should run (90-minute interval)
      run: |
        # Obter minuto atual
        CURRENT_MINUTE=$(date +%M)
        echo "Current minute: $CURRENT_MINUTE"
        
        # Executar apenas nos minutos: 0, 30, e também nos minutos 15, 45 para redundância
        # Isso garante execução a cada 30 minutos, mas com verificação extra
        if [ $((CURRENT_MINUTE % 30)) -eq 0 ]; then
          echo "SHOULD_RUN=true" >> $GITHUB_ENV
          echo "Running CDN update (scheduled: every 30 minutes)"
        else
          echo "SHOULD_RUN=false" >> $GITHUB_ENV
          echo "Skipping CDN update (not scheduled time)"
          echo "Scheduled times: minutes 0 and 30 of each hour"
        fi
        
    - name: Wait for CDN propagation
      if: env.SHOULD_RUN == 'true'
      run: |
        echo "Aguardando 30 segundos para propagação inicial..."
        sleep 30
        
    - name: Force CDN Purge - Repository Level
      if: env.SHOULD_RUN == 'true'
      run: |
        echo "=== Forçando purge geral do repositório ==="
        RESPONSE=$(curl -s -X POST "https://purge.jsdelivr.net/gh/canalqb/modulos_ESP@main")
        echo "Response: $RESPONSE"
        
        # Extrair ID do purge para verificação
        if command -v jq &> /dev/null; then
          PURGE_ID=$(echo "$RESPONSE" | jq -r '.id // "unknown"')
          STATUS=$(echo "$RESPONSE" | jq -r '.status // "unknown"')
          echo "Purge ID: $PURGE_ID"
          echo "Status: $STATUS"
        else
          echo "Status: $(echo "$RESPONSE" | grep -o '"status":"[^"]*"' | cut -d'"' -f4 || echo "unknown")"
        fi
        
    - name: Force CDN Purge - Individual Files
      if: env.SHOULD_RUN == 'true'
      run: |
        echo "=== Forçando purge de arquivos específicos ==="
        
        # Lista de arquivos críticos para atualizar
        FILES=(
          "ambiente/index.html"
          "ambiente/style.css"
          "ambiente/components.css"
          "ambiente/secure-config.js"
          "ambiente/ga4-gtm-integration.js"
          "ambiente/sites-externos.html"
          "ambiente/ads.txt"
        )
        
        SUCCESS_COUNT=0
        TOTAL_COUNT=${#FILES[@]}
        
        for file in "${FILES[@]}"; do
          echo "Purging: $file"
          
          # Tentar purge até 3 vezes com retry
          RETRY_COUNT=0
          MAX_RETRIES=3
          SUCCESS=false
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ] && [ "$SUCCESS" = false ]; do
            echo "  Tentativa $((RETRY_COUNT + 1))/$MAX_RETRIES"
            
            PURGE_RESPONSE=$(curl -s -X POST "https://purge.jsdelivr.net/gh/canalqb/modulos_ESP@main/$file")
            
            if [ $? -eq 0 ]; then
              echo "  Sucesso: $(echo "$PURGE_RESPONSE" | jq -r '.id // "completed"' 2>/dev/null || echo "completed")"
              SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
              SUCCESS=true
            else
              echo "  Erro na tentativa $((RETRY_COUNT + 1))"
              RETRY_COUNT=$((RETRY_COUNT + 1))
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "  Aguardando 5 segundos antes de retry..."
                sleep 5
              fi
            fi
          done
          
          if [ "$SUCCESS" = false ]; then
            echo "  Falha após $MAX_RETRIES tentativas para: $file"
          fi
          
          # Rate limiting entre arquivos
          sleep 2
        done
        
        echo "=== Resumo do Purge ==="
        echo "Arquivos processados: $TOTAL_COUNT"
        echo "Arquivos com sucesso: $SUCCESS_COUNT"
        echo "Taxa de sucesso: $((SUCCESS_COUNT * 100 / TOTAL_COUNT))%"
        
        # Salvar resultado para próximo step
        echo "SUCCESS_COUNT=$SUCCESS_COUNT" >> $GITHUB_ENV
        echo "TOTAL_COUNT=$TOTAL_COUNT" >> $GITHUB_ENV
        
    - name: Verify CDN Files
      if: env.SHOULD_RUN == 'true'
      run: |
        echo "=== Verificando disponibilidade dos arquivos no CDN ==="
        
        FILES=(
          "ambiente/index.html"
          "ambiente/style.css"
          "ambiente/components.css"
          "ambiente/secure-config.js"
          "ambiente/ga4-gtm-integration.js"
          "ambiente/sites-externos.html"
          "ambiente/ads.txt"
        )
        
        AVAILABLE_COUNT=0
        
        for file in "${FILES[@]}"; do
          echo "Verifying: $file"
          
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://cdn.jsdelivr.net/gh/canalqb/modulos_ESP@main/$file")
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "  Available: HTTP $HTTP_CODE [OK]"
            AVAILABLE_COUNT=$((AVAILABLE_COUNT + 1))
          else
            echo "  Not Available: HTTP $HTTP_CODE [ERROR]"
          fi
          
          sleep 1
        done
        
        echo "=== Resumo da Verificação ==="
        echo "Arquivos disponíveis: $AVAILABLE_COUNT/${#FILES[@]}"
        echo "Taxa de disponibilidade: $((AVAILABLE_COUNT * 100 / ${#FILES[@]}))%"
        
        echo "AVAILABLE_COUNT=$AVAILABLE_COUNT" >> $GITHUB_ENV
        
    - name: Test File Contents
      if: env.SHOULD_RUN == 'true'
      run: |
        echo "=== Testando conteúdo dos arquivos críticos ==="
        
        # Testar se index.html contém elementos esperados
        INDEX_CONTENT=$(curl -s "https://cdn.jsdelivr.net/gh/canalqb/modulos_ESP@main/ambiente/index.html")
        
        if echo "$INDEX_CONTENT" | grep -q "Configuração Ambiente AI"; then
          echo "  index.html: Contém Configuração Ambiente AI [OK]"
        else
          echo "  index.html: Não contém Configuração Ambiente AI [WARNING]"
        fi
        
        if echo "$INDEX_CONTENT" | grep -q "cdn.jsdelivr.net"; then
          echo "  index.html: Usando URLs do CDN [OK]"
        else
          echo "  index.html: Não está usando URLs do CDN [WARNING]"
        fi
        
        # Testar se style.css contém variáveis de tema
        STYLE_CONTENT=$(curl -s "https://cdn.jsdelivr.net/gh/canalqb/modulos_ESP@main/ambiente/style.css")
        
        if echo "$STYLE_CONTENT" | grep -q "var(--text-primary)"; then
          echo "  style.css: Contém variáveis de tema [OK]"
        else
          echo "  style.css: Não contém variáveis de tema [WARNING]"
        fi
        
    - name: Create Summary Report
      if: env.SHOULD_RUN == 'true'
      run: |
        echo "=== RELATÓRIO DE EXECUÇÃO ===" > $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Data/Hora:** $(date)" >> $GITHUB_STEP_SUMMARY
        echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
        echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        echo "## Resultados do CDN Purge" >> $GITHUB_STEP_SUMMARY
        echo "- **Arquivos processados:** $TOTAL_COUNT" >> $GITHUB_STEP_SUMMARY
        echo "- **Arquivos com sucesso:** $SUCCESS_COUNT" >> $GITHUB_STEP_SUMMARY
        
        # Calcular taxa de sucesso usando shell arithmetic
        SUCCESS_RATE=$(echo "scale=2; $SUCCESS_COUNT * 100 / $TOTAL_COUNT" | bc -l 2>/dev/null || echo "0")
        if [ "$SUCCESS_COUNT" = "$TOTAL_COUNT" ]; then
          SUCCESS_RATE="100"
        fi
        echo "- **Taxa de sucesso:** ${SUCCESS_RATE}%" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        echo "## Disponibilidade dos Arquivos" >> $GITHUB_STEP_SUMMARY
        echo "- **Arquivos disponíveis:** $AVAILABLE_COUNT/$TOTAL_COUNT" >> $GITHUB_STEP_SUMMARY
        
        # Calcular taxa de disponibilidade
        AVAILABLE_RATE=$(echo "scale=2; $AVAILABLE_COUNT * 100 / $TOTAL_COUNT" | bc -l 2>/dev/null || echo "0")
        if [ "$AVAILABLE_COUNT" = "$TOTAL_COUNT" ]; then
          AVAILABLE_RATE="100"
        fi
        echo "- **Taxa de disponibilidade:** ${AVAILABLE_RATE}%" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ "$SUCCESS_COUNT" = "$TOTAL_COUNT" ] && [ "$AVAILABLE_COUNT" = "$TOTAL_COUNT" ]; then
          echo "## Status: SUCESSO" >> $GITHUB_STEP_SUMMARY
          echo "Todos os arquivos foram atualizados e estão disponíveis no CDN." >> $GITHUB_STEP_SUMMARY
        else
          echo "## Status: PARCIAL" >> $GITHUB_STEP_SUMMARY
          echo "Alguns arquivos podem não ter sido atualizados corretamente." >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Arquivos Monitorados" >> $GITHUB_STEP_SUMMARY
        echo "- ambiente/index.html" >> $GITHUB_STEP_SUMMARY
        echo "- ambiente/style.css" >> $GITHUB_STEP_SUMMARY
        echo "- ambiente/components.css" >> $GITHUB_STEP_SUMMARY
        echo "- ambiente/secure-config.js" >> $GITHUB_STEP_SUMMARY
        echo "- ambiente/ga4-gtm-integration.js" >> $GITHUB_STEP_SUMMARY
        echo "- ambiente/sites-externos.html" >> $GITHUB_STEP_SUMMARY
        echo "- ambiente/ads.txt" >> $GITHUB_STEP_SUMMARY
        
    - name: Notify on Failure
      if: failure() && env.SHOULD_RUN == 'true'
      run: |
        echo "=== NOTIFICAÇÃO DE FALHA ==="
        echo "O workflow de atualização do CDN falhou!"
        echo "Data/Hora: $(date)"
        echo "Branch: ${{ github.ref_name }}"
        echo "Commit: ${{ github.sha }}"
        
        # Aqui poderia ser adicionada notificação por email, Slack, etc.
        
    - name: Wait for Final Propagation
      if: env.SHOULD_RUN == 'true'
      run: |
        echo "Aguardando propagação final do CDN..."
        sleep 30
        
    - name: Final Verification
      if: env.SHOULD_RUN == 'true'
      run: |
        echo "=== Verificação Final ==="
        
        # Teste final de um arquivo crítico
        FINAL_HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://cdn.jsdelivr.net/gh/canalqb/modulos_ESP@main/ambiente/index.html")
        
        if [ "$FINAL_HTTP_CODE" = "200" ]; then
          echo "Verificação final: SUCESSO (HTTP $FINAL_HTTP_CODE)"
          echo "Workflow concluído com sucesso!"
        else
          echo "Verificação final: FALHA (HTTP $FINAL_HTTP_CODE)"
          echo "Atenção: O index.html pode não estar disponível no CDN"
          exit 1
        fi
        
    - name: Skip Message
      if: env.SHOULD_RUN == 'false'
      run: |
        echo "=== EXECUÇÃO PULADA ==="
        echo "CDN update pulado - horário agendado não atingido"
        echo "Próxima execução em: $((30 - $(date +%M) % 30)) minutos"
