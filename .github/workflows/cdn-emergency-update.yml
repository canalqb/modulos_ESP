name: CDN Emergency Update

# ESPECIFICAÇÃO: Apenas pasta ambiente/ deve ser sincronizada com CDN
# Outras pastas (.github, marketplace, etc.) devem permanecer apenas no repositório local
# NENHUM arquivo fora de ambiente/ deve ser enviado para o CDN

on:
  workflow_dispatch:
    inputs:
      force_level:
        description: 'Level of force to apply'
        required: true
        default: 'medium'
        type: choice
        options:
        - light
        - medium
        - heavy
      wait_time:
        description: 'Wait time between operations (seconds)'
        required: false
        default: '5'
        type: string
      retry_count:
        description: 'Number of retries for failed operations'
        required: false
        default: '5'
        type: string

jobs:
  emergency-cdn-update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Display Parameters
      run: |
        echo "=== PARÂMETROS DE EMERGÊNCIA ==="
        echo "Force Level: ${{ github.event.inputs.force_level }}"
        echo "Wait Time: ${{ github.event.inputs.wait_time }} seconds"
        echo "Retry Count: ${{ github.event.inputs.retry_count }}"
        echo ""
        
    - name: Initialize Variables
      run: |
        # Configurar variáveis baseadas no nível de força
        case "${{ github.event.inputs.force_level }}" in
          "light")
            WAIT_TIME=3
            MAX_RETRIES=3
            RETRY_DELAY=10
            ;;
          "medium")
            WAIT_TIME=${{ github.event.inputs.wait_time || 5 }}
            MAX_RETRIES=${{ github.event.inputs.retry_count || 5 }}
            RETRY_DELAY=15
            ;;
          "heavy")
            WAIT_TIME=10
            MAX_RETRIES=${{ github.event.inputs.retry_count || 10 }}
            RETRY_DELAY=30
            ;;
          *)
            WAIT_TIME=5
            MAX_RETRIES=5
            RETRY_DELAY=15
            ;;
        esac
        
        echo "WAIT_TIME=$WAIT_TIME" >> $GITHUB_ENV
        echo "MAX_RETRIES=$MAX_RETRIES" >> $GITHUB_ENV
        echo "RETRY_DELAY=$RETRY_DELAY" >> $GITHUB_ENV
        
        echo "Configuração:"
        echo "  Wait Time: $WAIT_TIME segundos"
        echo "  Max Retries: $MAX_RETRIES"
        echo "  Retry Delay: $RETRY_DELAY segundos"
        
    - name: Heavy Force - Multiple CDN Providers
      if: github.event.inputs.force_level == 'heavy'
      run: |
        echo "=== FORÇA PESADA - Múltiplos Providers CDN ==="
        
        # jsDelivr (GitHub)
        echo "1. jsDelivr GitHub"
        curl -s -X POST "https://purge.jsdelivr.net/gh/canalqb/modulos_ESP@main" | jq '.id' || echo "Failed"
        
        # jsDelivr (GitLab - se aplicável)
        echo "2. jsDelivr GitLab (se existir)"
        curl -s -X POST "https://purge.jsdelivr.net/gl/canalqb/modulos_ESP@main" | jq '.id' 2>/dev/null || echo "Not applicable"
        
        # jsDelivr (Bitbucket - se aplicável)
        echo "3. jsDelivr Bitbucket (se existir)"
        curl -s -X POST "https://purge.jsdelivr.net/gh/canalqb/modulos_ESP@main" | jq '.id' 2>/dev/null || echo "Not applicable"
        
        sleep $RETRY_DELAY
        
    - name: Aggressive File Purge
      run: |
        echo "=== PURGE AGRESSIVO DE ARQUIVOS ==="
        
        # Lista extendida de arquivos (apenas pasta ambiente/)
        FILES=(
          "ambiente/index.html"
          "ambiente/style.css"
          "ambiente/components.css"
          "ambiente/secure-config.js"
          "ambiente/ga4-gtm-integration.js"
          "ambiente/sites.txt"
        )
        
        SUCCESS_COUNT=0
        TOTAL_COUNT=${#FILES[@]}
        FAILED_FILES=()
        
        for file in "${FILES[@]}"; do
          echo "=== Processando: $file ==="
          
          RETRY_COUNT=0
          SUCCESS=false
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ] && [ "$SUCCESS" = false ]; do
            echo "  Tentativa $((RETRY_COUNT + 1))/$MAX_RETRIES"
            
            # Tentar purge
            PURGE_RESPONSE=$(curl -s -w "%{http_code}" -X POST "https://purge.jsdelivr.net/gh/canalqb/modulos_ESP@main/$file")
            HTTP_CODE="${PURGE_RESPONSE: -3}"
            RESPONSE_BODY="${PURGE_RESPONSE%???}"
            
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "202" ]; then
              echo "  Purge OK: HTTP $HTTP_CODE"
              SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
              SUCCESS=true
              
              # Verificar imediatamente se o arquivo está disponível
              sleep $WAIT_TIME
              VERIFY_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://cdn.jsdelivr.net/gh/canalqb/modulos_ESP@main/$file")
              
              if [ "$VERIFY_CODE" = "200" ]; then
                echo "  Verificação OK: HTTP $VERIFY_CODE"
              else
                echo "  Verificação FALHA: HTTP $VERIFY_CODE (mas purge foi OK)"
              fi
              
            else
              echo "  Purge FALHA: HTTP $HTTP_CODE"
              RETRY_COUNT=$((RETRY_COUNT + 1))
              
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "  Aguardando $RETRY_DELAY segundos antes de retry..."
                sleep $RETRY_DELAY
              fi
            fi
          done
          
          if [ "$SUCCESS" = false ]; then
            echo "  FALHA TOTAL após $MAX_RETRIES tentativas"
            FAILED_FILES+=("$file")
          fi
          
          # Rate limiting entre arquivos
          sleep $WAIT_TIME
        done
        
        echo "=== RESUMO DO PURGE AGRESSIVO ==="
        echo "Arquivos processados: $TOTAL_COUNT"
        echo "Arquivos com sucesso: $SUCCESS_COUNT"
        echo "Arquivos com falha: ${#FAILED_FILES[@]}"
        echo "Taxa de sucesso: $((SUCCESS_COUNT * 100 / TOTAL_COUNT))%"
        
        if [ ${#FAILED_FILES[@]} -gt 0 ]; then
          echo ""
          echo "Arquivos com falha:"
          for failed in "${FAILED_FILES[@]}"; do
            echo "  - $failed"
          done
        fi
        
        # Salvar variáveis para steps seguintes
        echo "SUCCESS_COUNT=$SUCCESS_COUNT" >> $GITHUB_ENV
        echo "TOTAL_COUNT=$TOTAL_COUNT" >> $GITHUB_ENV
        echo "FAILED_FILES_COUNT=${#FAILED_FILES[@]}" >> $GITHUB_ENV
        
    - name: Multi-Region Verification
      run: |
        echo "=== VERIFICAÇÃO MULTI-REGIÃO ==="
        
        FILES=("ambiente/index.html" "ambiente/style.css")
        REGIONS=(
          "https://cdn.jsdelivr.net"
          "https://fastly.jsdelivr.net"
          "https://gcore.jsdelivr.net"
        )
        
        for region in "${REGIONS[@]}"; do
          echo "=== Testando região: $region ==="
          
          REGION_SUCCESS=0
          for file in "${FILES[@]}"; do
            URL="$region/gh/canalqb/modulos_ESP@main/$file"
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "  $file: HTTP $HTTP_CODE [OK]"
              REGION_SUCCESS=$((REGION_SUCCESS + 1))
            else
              echo "  $file: HTTP $HTTP_CODE [ERROR]"
            fi
          done
          
          echo "  Região $region: $REGION_SUCCESS/${#FILES[@]} arquivos disponíveis"
          echo ""
        done
        
    - name: Cache Busting Techniques
      if: github.event.inputs.force_level == 'heavy'
      run: |
        echo "=== TÉCNICAS DE CACHE BUSTING ==="
        
        # Adicionar timestamp como query parameter para forçar refresh
        TIMESTAMP=$(date +%s)
        
        echo "1. Testando com query parameters"
        curl -s -o /dev/null -w "%{http_code}" "https://cdn.jsdelivr.net/gh/canalqb/modulos_ESP@main/ambiente/index.html?t=$TIMESTAMP"
        
        echo "2. Testando com versão no path"
        curl -s -o /dev/null -w "%{http_code}" "https://cdn.jsdelivr.net/gh/canalqb/modulos_ESP@main/ambiente/index.html"
        
        echo "3. Forçando headers de no-cache"
        curl -s -H "Cache-Control: no-cache" -H "Pragma: no-cache" -o /dev/null -w "%{http_code}" "https://cdn.jsdelivr.net/gh/canalqb/modulos_ESP@main/ambiente/index.html"
        
    - name: Final Comprehensive Test
      run: |
        echo "=== TESTE COMPREENSIVO FINAL ==="
        
        # Teste completo do index.html
        echo "1. Teste completo do index.html"
        INDEX_URL="https://cdn.jsdelivr.net/gh/canalqb/modulos_ESP@main/ambiente/index.html"
        
        # Obter conteúdo completo
        INDEX_CONTENT=$(curl -s "$INDEX_URL")
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$INDEX_URL")
        
        echo "   HTTP Code: $HTTP_CODE"
        echo "   Content Size: $(echo "$INDEX_CONTENT" | wc -c) bytes"
        
        # Verificar elementos críticos
        if echo "$INDEX_CONTENT" | grep -q "Configuração Ambiente AI"; then
          echo "   Configuração Ambiente AI: [OK]"
        else
          echo "   Configuração Ambiente AI: [MISSING]"
        fi
        
        if echo "$INDEX_CONTENT" | grep -q "cdn.jsdelivr.net"; then
          echo "   CDN URLs: [OK]"
        else
          echo "   CDN URLs: [MISSING]"
        fi
        
        if echo "$INDEX_CONTENT" | grep -q "unlockModules"; then
          echo "   Google Drive Unlock: [OK]"
        else
          echo "   Google Drive Unlock: [MISSING]"
        fi
        
        # Teste de performance
        echo "2. Teste de performance"
        START_TIME=$(date +%s%N)
        curl -s "$INDEX_URL" > /dev/null
        END_TIME=$(date +%s%N)
        RESPONSE_TIME=$(( (END_TIME - START_TIME) / 1000000 ))
        
        echo "   Response Time: ${RESPONSE_TIME}ms"
        
        if [ $RESPONSE_TIME -lt 1000 ]; then
          echo "   Performance: [EXCELLENT]"
        elif [ $RESPONSE_TIME -lt 3000 ]; then
          echo "   Performance: [GOOD]"
        else
          echo "   Performance: [SLOW]"
        fi
        
    - name: Emergency Report
      run: |
        echo "=== RELATÓRIO DE EMERGÊNCIA ===" > $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Data/Hora:** $(date)" >> $GITHUB_STEP_SUMMARY
        echo "**Nível de Força:** ${{ github.event.inputs.force_level }}" >> $GITHUB_STEP_SUMMARY
        echo "**Trigger:** Manual (Emergency)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        echo "## Resultados do Purge Aggressivo" >> $GITHUB_STEP_SUMMARY
        echo "- **Arquivos processados:** $TOTAL_COUNT" >> $GITHUB_STEP_SUMMARY
        echo "- **Arquivos com sucesso:** $SUCCESS_COUNT" >> $GITHUB_STEP_SUMMARY
        echo "- **Arquivos com falha:** $FAILED_FILES_COUNT" >> $GITHUB_STEP_SUMMARY
        # Calcular taxa de sucesso
        SUCCESS_RATE=$(echo "scale=2; $SUCCESS_COUNT * 100 / $TOTAL_COUNT" | bc -l 2>/dev/null || echo "0")
        if [ "$SUCCESS_COUNT" = "$TOTAL_COUNT" ]; then
          SUCCESS_RATE="100"
        fi
        echo "- **Taxa de sucesso:** ${SUCCESS_RATE}%" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ "$FAILED_FILES_COUNT" -gt 0 ]; then
          echo "## Arquivos com Falha" >> $GITHUB_STEP_SUMMARY
          echo "Os seguintes arquivos não puderam ser atualizados:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ "$SUCCESS_COUNT" = "$TOTAL_COUNT" ]; then
          echo "## Status: SUCESSO COMPLETO" >> $GITHUB_STEP_SUMMARY
          echo "Todos os arquivos foram atualizados com sucesso!" >> $GITHUB_STEP_SUMMARY
        elif [ "$SUCCESS_COUNT" -gt $((TOTAL_COUNT / 2)) ]; then
          echo "## Status: SUCESSO PARCIAL" >> $GITHUB_STEP_SUMMARY
          echo "Maioria dos arquivos foi atualizada, mas alguns precisam de atenção." >> $GITHUB_STEP_SUMMARY
        else
          echo "## Status: FALHA CRÍTICA" >> $GITHUB_STEP_SUMMARY
          echo "Muitos arquivos não puderam ser atualizados. Ação manual necessária." >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Próximos Passos" >> $GITHUB_STEP_SUMMARY
        if [ "$SUCCESS_COUNT" = "$TOTAL_COUNT" ]; then
          echo "1. Verificar se os arquivos estão funcionando no navegador" >> $GITHUB_STEP_SUMMARY
          echo "2. Testar funcionalidades críticas do sistema" >> $GITHUB_STEP_SUMMARY
        else
          echo "1. Investigar causas das falhas" >> $GITHUB_STEP_SUMMARY
          echo "2. Considerar contato com suporte do jsDelivr" >> $GITHUB_STEP_SUMMARY
          echo "3. Verificar se há problemas no repositório GitHub" >> $GITHUB_STEP_SUMMARY
        fi
